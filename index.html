<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="heading" class="heading-title">
        Generate a
        <span id="heading-green">random Password</span>
      </h1>
      <p class="para" id="para">Never use an unsecure password again.</p>
      <button id="gen-pass-btn">Generate Password</button>
      <hr />
      <div class="result">
        <p class="generated-password" id="gen-pass-result-1"></p>
        <p class="generated-password" id="gen-pass-res-result-2"></p>
      </div>
    </div>
  </body>
</html>
